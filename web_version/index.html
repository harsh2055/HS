<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Hand Tracking Web App</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- MediaPipe Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>AI Hand Tracking 🖐️</h1>
      <p>Recognizes Gestures • Pinch • Peace • Fist • Thumbs Up</p>
    </header>
    
    <div class="controls">
      <button id="toggleCamera" class="btn">Stop Camera</button>
    </div>

    <div class="main-content">
      <div class="video-container">
        <video class="input_video" style="display: none;" autoplay playsinline></video>
        <canvas class="output_canvas" width="800" height="600"></canvas>
        <div id="loading" class="overlay-badge">Loading AI Models...</div>
        
        <!-- Live HUD inside the canvas area -->
        <div class="hud">
          <div id="fps" class="hud-item">FPS: 0</div>
          <div id="gestureLabel" class="hud-item highlight">Gesture: None</div>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
