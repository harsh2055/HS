<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether Gestures | Next-Gen AI Interaction</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
</head>
<body class="dark">
    <nav class="navbar">
        <div class="logo">AETHER <span>AI</span></div>
        <div class="nav-links">
            <a href="#features">Features</a>
            <a href="#demo" class="active">Live Demo</a>
            <button id="settingsBtn" class="icon-btn">⚙️</button>
        </div>
    </nav>

    <main class="container">
        <section id="demo" class="demo-section">
            <div class="viewport-card">
                <div class="canvas-container">
                    <canvas class="output_canvas"></canvas>
                    <video class="input_video" style="display:none"></video>
                    
                    <!-- Glow Overlay -->
                    <div class="skeleton-glow"></div>
                    
                    <!-- Smart HUD -->
                    <div class="hud-top">
                        <div class="chip">
                            <span class="label">ENGINE</span>
                            <span class="status pulse">AI ACTIVE</span>
                        </div>
                        <div id="fpsLabel" class="chip">FPS: 0</div>
                    </div>

                    <div class="hud-bottom">
                        <div class="gesture-display">
                            <div id="gestureIcon" class="gesture-icon">🖐️</div>
                            <div class="gesture-meta">
                                <h2 id="gestureLabel">Idle</h2>
                                <div class="confidence-bar">
                                    <div id="confidenceFill" class="fill"></div>
                                </div>
                                <span id="confidenceText">0% Confidence</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="sidebar">
                    <div class="card event-card">
                        <h3>⚡ Event Stream</h3>
                        <ul id="eventLogs"></ul>
                    </div>
                    <div class="card plugin-card">
                        <h3>🔌 Active Plugins</h3>
                        <div class="plugin-list">
                            <div class="plugin-item active">Mouse.Core</div>
                            <div class="plugin-item active">Volume.Sys</div>
                            <div class="plugin-item">Media.Control</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>System Settings</h2>
            <div class="setting-group">
                <label>Sensitivity</label>
                <input type="range" min="1" max="10" value="5">
            </div>
            <div class="setting-group">
                <label>AI Filtering</label>
                <input type="checkbox" checked>
            </div>
            <button id="closeModal" class="btn-primary">Save Changes</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
